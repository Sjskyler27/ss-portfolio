[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  included_files = ["src/App.vue", "src/data/**", "documents/**", "ai/projects/skyler_bot/**", "README.md"]

[dev]
  command = "npm run serve -- --host 0.0.0.0"
  port = 8888
  targetPort = 8080
  functions = "netlify/functions"
